<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TaskMemo</title>

<style>

body {
    font-family: sans-serif;
    background-color: #111;
    color: white;
}

#messages {

    width:auto;
    height:auto;
    flex:1;
    background:#1e1e1e;
    border:1px solid #333;
    padding:15px;

}


/* メッセージ全体 */
.message {
    margin:15px 5px;
    display: flex;
}


/* 左側（相手） */
.left {
    justify-content: flex-start;
}


/* 右側（自分） */
.right {
    justify-content: flex-end;
}


/* 名前 */
.name {

    font-size:13px;
    color:#9cdcfe;
    margin-bottom:4px;

}

.other {
    background:#333333;
}

.mine {
    background:#094771;
}

.tool-button {
    background: #252526;
    color: #d4d4d4;
    border: 1px solid #3c3c3c;
    padding: 8px 12px;
    cursor: pointer;
}

.tool-button:hover {
    background: #333333;
}

#users {

    width:220px;
    background:#252526;
    border-right:1px solid #3c3c3c;
    border-radius:0;
    margin:0;
    padding:15px;

}

input {
    background: #333;
    color: white;
    border: 1px solid #555;
    padding: 8px;
}

button {
    background: #333;
    color: white;
    border: 1px solid #555;
    padding: 8px 15px;
}

.balloon {

    padding:10px;
    border-radius:6px;
    background:#2d2d30;
    border:1px solid #3c3c3c;
    min-width:80px;

}

.layout {

    display:flex;
    height:80vh;

}

.chat-area {

    flex:1;
    display:flex;
    flex-direction:column;

}

.input-area {

    display:flex;
    background:#252526;
    padding:10px;
    position:sticky;
    bottom:0;

}


.input-area input {

    flex:1;

}

.header {

    height:50px;
    background:#252526;
    border-bottom:1px solid #3c3c3c;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;

}

.title {

    font-size:18px;
    font-weight:bold;
    color:#ffffff;

}

.status {
    font-size:13px;
    color:#9cdcfe;
}

.user-input {

    background:#1e1e1e;
    padding:10px 20px;
    border-bottom:1px solid #333;
}

.time {

    font-size:11px;
    color:#999;
    text-align:right;
    margin-top:5px;

}

.chat-image {

    max-width:250px;
    border-radius:8px;
    cursor:pointer;

    transition:0.2s;

}

.chat-image.zoom {

    max-width:800px;
    position:relative;

}

</style>

</head>

<body>

<header class="header">

    <div class="title">
        TASK Workspace
    </div>

    <div class="status">
        Online Chat
    </div>

</header>

<div class="user-input">

    名前：
    <input id="name" type="text">

</div>

<div class="layout">

    <div id="users">
    </div>


    <div class="chat-area">

        <div id="messages">
        </div>


        <div class="input-area">

            <input id="input" type="text" onkeydown="enterSend(event)">

            <button onclick="sendMessage()">
                送信
            </button>

        </div>

    </div>

</div>

<button class="tool-button" button onclick="openChatGPT()">
隠す
</button>

<script>

const ws = new WebSocket(
    location.origin.replace("http", "ws")
);

let myName = "";
let myId = "";

ws.onopen = function(){
    myName =
        document.getElementById("name").value;
};

ws.onmessage = function(event){

    const data = JSON.parse(event.data);

    if(data.type === "id"){

        myId = data.id;

        return;

    }

    if(data.type === "users"){

    const users =
        document.getElementById("users");


users.innerHTML =
    data.users.map(
        user => "🟢 " + user
    ).join("<br>");


    return;

}

if(data.type === "image"){


    const messages =
        document.getElementById("messages");


    let position = "left";

    if(data.id === myId){

        position = "right";

    }


    messages.innerHTML += `

    <div class="message ${position}">

        <div>

            <div class="name">
                🖼️ ${data.name}
            </div>

            <img 
                src="${data.image}"
                class="chat-image"
                onclick="zoomImage(this)"
            >

        </div>

    </div>

    `;

    scrollToBottom();

    return;

}

    const messages =
        document.getElementById("messages");

    // 入退室メッセージ
    if(data.type === "system"){
        messages.innerHTML += `
        <div style="
            text-align:center;
            color:gray;
            margin:10px;
        ">
            ${data.message}
        </div>
        `;
        scrollToBottom();
        return;
    }

    // 普通のメッセージ
    let position = "left";
    let color = "other";
    if(data.id === myId){
        position = "right";
        color = "mine";
    }

    messages.innerHTML += `
    <div class="message ${position}">
        <div>
            <div class="name">
                ${data.name}
            </div>
            <div class="balloon ${color}">

                ${data.text}

                <div class="time">
                    ${data.time || ""}
                </div>

            </div>
        </div>
    </div>
    `;

    // 追加：一番下へ移動
    scrollToBottom();
};

function sendMessage(){

    const name =
        document.getElementById("name").value;

    const input =
        document.getElementById("input").value;

    if(name === ""){
        alert("名前を入力してください");
        return;
    }

    // 初回だけ入室通知
    if(myName === ""){

        myName = name;

        ws.send(JSON.stringify({
            type:"join",
            name:name
        }));
    }

    if(input === ""){
        return;
    }

    ws.send(JSON.stringify({

        type:"message",
        text:input

    }));
    document.getElementById("input").value="";
}

function enterSend(event) {

    if(event.key === "Enter") {
        sendMessage();
    }
}

document.addEventListener("keydown", function(event){

    if(event.key === "F2"){

        openChatGPT();

    }

});

function openChatGPT(){

    window.location.href = "https://chat.openai.com/";

}

document.addEventListener("paste", function(event){

    const items = event.clipboardData.items;


    for(let i = 0; i < items.length; i++){

        const item = items[i];


        if(item.type.indexOf("image") !== -1){

            const file = item.getAsFile();


            const reader = new FileReader();


            reader.onload = function(){

                ws.send(JSON.stringify({

                    type:"image",
                    image:reader.result

                }));

            };


            reader.readAsDataURL(file);

        }

    }

});

function zoomImage(img){


    if(img.classList.contains("zoom")){


        img.classList.remove("zoom");


    }else{


        img.classList.add("zoom");


    }


}

function scrollToBottom(){

    const messages =
        document.getElementById("messages");

    messages.scrollTop =
        messages.scrollHeight;

}

</script>

</body>

</html>
