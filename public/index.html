<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LINE風チャット</title>

<style>

body {
    font-family: sans-serif;
}

#messages {
    width: 400px;
    height: 450px;
    border: 1px solid #ccc;
    padding: 10px;
    overflow-y: auto;
    background: #f5f5f5;
}


/* メッセージ全体 */
.message {
    margin: 10px;
    display: flex;
}


/* 左側（相手） */
.left {
    justify-content: flex-start;
}


/* 右側（自分） */
.right {
    justify-content: flex-end;
}


/* 名前 */
.name {
    font-size: 12px;
    color: #555;
}


/* 吹き出し */
.balloon {
    padding: 10px 15px;
    border-radius: 15px;
    max-width: 250px;
}


/* 相手の色 */
.other {
    background: white;
}


/* 自分の色 */
.mine {
    background: #a7e9af;
}


</style>

</head>


<body>

<h1>チャット</h1>


名前：
<input id="name" type="text">


<div id="messages"></div>


<input id="input" type="text">
<button onclick="sendMessage()">送信</button>



<script>


const ws = new WebSocket(
    location.origin.replace("http", "ws")
);


let myName = "";



ws.onopen = function(){

    myName =
        document.getElementById("name").value;

};



ws.onmessage = function(event){


    const data = JSON.parse(event.data);


    const messages =
        document.getElementById("messages");



    // 入退室メッセージ
    if(data.type === "system"){


        messages.innerHTML += `

        <div style="
            text-align:center;
            color:gray;
            margin:10px;
        ">
            ${data.message}
        </div>

        `;


        return;

    }



    // 普通のメッセージ

    let position = "left";
    let color = "other";


    if(data.name === myName){

        position = "right";
        color = "mine";

    }



    messages.innerHTML += `

    <div class="message ${position}">

        <div>

            <div class="name">
                ${data.name}
            </div>

            <div class="balloon ${color}">
                ${data.text}
            </div>

        </div>

    </div>

    `;


};





function sendMessage(){


    const name =
        document.getElementById("name").value;


    const input =
        document.getElementById("input").value;



    if(name === ""){

        alert("名前を入力してください");
        return;

    }



    // 初回だけ入室通知
    if(myName === ""){

        myName = name;


        ws.send(JSON.stringify({

            type:"join",
            name:name

        }));

    }



    if(input === ""){

        return;

    }



    ws.send(JSON.stringify({

        type:"message",
        name:name,
        text:input

    }));



    document.getElementById("input").value="";


}


</script>


</body>
</html>
