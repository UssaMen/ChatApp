<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TaskMemo</title>

<style>

body {
    font-family: sans-serif;
    background-color: #111;
    color: white;
}

#messages {
    flex: 1;
    width: auto;
    height: 0;
    border: 1px solid #333;
    padding: 15px;
    overflow-y: auto;
    background:#1e1e1e;
}

/* メッセージ全体 */
.message {
    margin:6px 5px;
    display:flex;
}

/* 左側（相手） */
.left {
    justify-content: flex-start;
}

/* 右側（自分） */
.right {
    justify-content: flex-end;
}

/* 名前 */
.name {

    font-size:13px;
    color:#9cdcfe;
    margin-bottom:3px;

}

.other {
    background:#333333;
}

.mine {
    background:#094771;
}

.tool-button {
    background: #252526;
    color: #d4d4d4;
    border: 1px solid #3c3c3c;
    padding: 8px 12px;
    cursor: pointer;
}

.tool-button:hover {
    background: #333333;
}

#users {
    width:220px;
    flex-shrink:0;
    background:#222;
    padding:10px;
    transition:0.3s;
    overflow:hidden;
}


#users.collapsed {
    width:50px;
    padding:0;
}

#users.collapsed .users-icon {
    display:block;
}

#users.collapsed #user-list {
    display:none;
}

input {
    background: #333;
    color: white;
    border: 1px solid #555;
    padding: 8px;
}

button {
    background:#333;
    color:white;
    border:1px solid #555;
    padding:6px 15px;
    height:34px;
}

.balloon {
    padding:6px 10px;
    border-radius:6px;
    background:#2d2d30;
    border:1px solid #3c3c3c;
    min-width:80px;
}

.layout {
    display:flex;
    height:80vh;
}

.chat-area {
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
}

.input-area {
    display:flex;
    background:#252526;
    padding:10px;
    flex-shrink:0;
}


.input-area textarea {
    flex:1;
    background:#333;
    color:white;
    border:1px solid #555;
    padding:4px 8px;
    resize:none;
    overflow-y:hidden;
    height:20px;
    min-height:20px;
    max-height:120px;
    line-height:20px;
    font-family:sans-serif;
}

.header {
    height:50px;
    background:#252526;
    border-bottom:1px solid #3c3c3c;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
}

.title {
    font-size:18px;
    font-weight:bold;
    color:#ffffff;
}

.status {
    font-size:13px;
    color:#9cdcfe;
}

select {
    background:#333;
    color:white;
    border:1px solid #555;
    padding:8px;
}

.user-input {
    background:#1e1e1e;
    padding:10px 20px;
    border-bottom:1px solid #333;
    display:flex;
    align-items:center;
    gap:10px;
}

.users-icon {
    display:none;
    text-align:center;
    font-size:22px;
    padding:10px;
}

.time {
    font-size:11px;
    color:#999;
    text-align:right;
    margin-top:2px;
}

.chat-image {
    max-width:250px;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

.chat-image.zoom {
    max-width:800px;
    position:relative;
}

#typing {
    height:20px;
    color:#9cdcfe;
    font-size:13px;
    padding-left:15px;
    font-style:italic;
}

.typing-dots::after {
    content:"";
    animation:dots 1.5s infinite;
}

.urgent {
    background:#8b0000;
    color:white;
    border:2px solid red;
    font-weight:bold;
}

#pinned {
    background:#252526;
    border:1px solid #3c3c3c;
    padding:10px;
    margin-bottom:5px;
    color:#00e1ff;
}

.pinned-item {
    margin-top:5px;
    color:white;
}

.pin-button {
    padding:2px 5px;
    font-size:12px;
    border-radius:4px;
    margin-left:5px;
    cursor:pointer;
}

.pinned-item button {
    font-size:11px;
    padding:2px 6px;
    margin-left:10px;
}

@keyframes dots {
    0% {
        content:"";
    }

    33% {
        content:".";
    }

    66% {
        content:"..";
    }

    100% {
        content:"...";
    }

}

.reaction-area {

    margin-top:5px;
    color:#0bffeb;
    font-size:13px;

}

.reaction-buttons {

    display:none;

    margin-top:5px;

}


.balloon:hover .reaction-buttons {

    display:block;

}

</style>

</head>

<body>

<header class="header">

    <div class="title">
        TASK Workspace
    </div>

    <div class="status">
        Online Chat
    </div>

    <button class="tool-button" onclick="toggleUsers()">
    ☰
    </button>

    <button class="tool-button" onclick="openBoardWindow()">
    🖊 WhiteBoard
    </button>

</header>

<div class="user-input">
    名前：
    <input id="name" type="text" autocomplete="off">
    パスワード：
    <input id="password" type="password">
    部屋：
    <select id="room"></select>
    入室
    <button onclick="joinRoom()"></button>
</div>

<div class="layout">
    <div id="users">
        <div class="users-icon">
            👥
        </div>
        <div id="user-list">
        </div>
    </div>
    <div class="chat-area">
        <div id="pinned"></div>
        <div id="messages"></div>
        <div id="typing"></div>
        <div class="input-area">
        <textarea id="input"
            onkeydown="enterSend(event)"
            oninput="typing(); autoResize(this);">
        </textarea>
        <button onclick="sendUrgent()">
            🚨
        </button>
        <button onclick="sendMessage()">
            送信
        </button>
        </div>
    </div>
</div>

<button class="tool-button" button onclick="openGoogle()">
隠す
</button>

<script>

const rooms = [
    "room1",
    "room2",
    "room3"
];

function setupRooms(){

    const select =
        document.getElementById("room");

    rooms.forEach(room=>{

        const option =
            document.createElement("option");

        option.value = room;
        option.text = room;

        select.appendChild(option);

    });
}

window.onload = function(){

    setupRooms();

};

if (Notification.permission !== "granted")
{
    Notification.requestPermission();
}

const ws = new WebSocket(location.origin.replace("http", "ws"));

let myName = "";
let myId = "";

ws.onopen = function()
{
    myName = document.getElementById("name").value;
};

ws.onmessage = function(event)
{
    const data = JSON.parse(event.data);

    if (data.type === "error"){
        alert(data.message);
        return;
    }

    if (data.type === "message" &&
        !data.history &&
        data.id !== myId &&
        document.hidden &&
        Notification.permission === "granted")
    {
        new Notification("TASK Workspace",{body:"💡"});
    }


    if(data.type === "reaction")
    {
        const area =
            document.getElementById(
                "reaction-" + data.messageId
            );

        if(area)
        {
            area.innerHTML = "";
            Object.keys(data.counts).forEach((emoji)=>{
                area.innerHTML +=
                    emoji + " " +
                    data.counts[emoji] +
                    " ";
            });
        }
        return;
    }


    if(data.type === "read")
    {
        const target = document.getElementById("read-" + data.messageId);

        if (target)
        {
            target.innerHTML ="既読";
        }

        return;
    }

    if (data.type === "typing")
    {
        const typing = document.getElementById("typing");

        if (data.id !== myId && data.typing)
        {
            typing.innerHTML = data.name + " さんが入力中<span class='typing-dots'></span>";
        }
        else
        {
            typing.innerHTML = "";
        }

        return;
    }

    if (data.type === "id")
    {  
        myId = data.id;
        return;
    }

    if (data.type === "pin")
    {

        const pinned = document.getElementById("pinned");
        pinned.innerHTML = "📌<br>";

        data.pinnedMessages.forEach((msg)=>{

            pinned.innerHTML += `
            <div class="pinned-item">
                ${msg.name}: ${msg.text}
                <button onclick="unpinMessage('${msg.id}')">
                    ×
                </button×
            </div>
            `;
        });

        return;
    }

    if (data.type === "users")
    {
        const userList = document.getElementById("user-list");
        userList.innerHTML = data.users.map(user => "🟢 " + user).join("<br>");

        return;
    }

    if (data.type === "image")
    {

        const messages = document.getElementById("messages");
        let position = "left";

        if (data.id === myId)
        {
            position = "right";
        }

        messages.innerHTML += `

        <div class="message ${position}">
            <div>
                <div class="name">
                    🖼️ ${data.name}
                </div>
                <img 
                    src="${data.image}"
                    class="chat-image"
                    onclick="zoomImage(this)"
                >
            </div>
        </div>
        `;

        scrollToBottom();

        return;
    }

    const messages = document.getElementById("messages");

    // 入退室メッセージ
    if (data.type === "system")
    {
        messages.innerHTML += `
        <div style="
            text-align:center;
            color:gray;
            margin:10px;
        ">
            ${data.message}
        </div>
        `;
        scrollToBottom();
        return;
    }

    // 普通のメッセージ
    let position = "left";
    let color = "other";
    let urgentClass = "";

    if (data.urgent)
    {
        urgentClass = "urgent";
    }

    if (data.id === myId)
    {
        position = "right";
        color = "mine";
    }

    messages.innerHTML += `
    <div class="message ${position}">
        <div>
            <div class="name">
                ${data.name}
            </div>
            <div class="balloon ${color} ${urgentClass}">

                ${data.text.replace(/\n/g, "<br>")}

                <div class="time">
                    ${data.time || ""}
                    <span id="read-${data.messageId}"></span>
                </div>

                <div class="reaction-area"
                    id="reaction-${data.messageId}">
                </div>

                <div class="reaction-buttons">

                    <button onclick="reaction('${data.messageId}','👍')">
                        👍
                    </button>

                    <button onclick="reaction('${data.messageId}','❤️')">
                        ❤️
                    </button>

                    <button onclick="reaction('${data.messageId}','😂')">
                        😂
                    </button>

                    <button class="pin-button"
                        onclick="pinMessage(\`${data.text}\`)">
                        📌
                    </button>

                </div>

            </div>
        </div>
    </div>
    `;

    // 既読処理
    if(data.id !== myId)
    {
        ws.send(JSON.stringify({
            type:"read",
            messageId:data.messageId
        }));
    }

    // 追加：一番下へ移動
    scrollToBottom();
};

function sendMessage(){

    if(myName === ""){

        alert("先に入室してください");

        return;

    }

    const input =
        document.getElementById("input").value;


    if(input === ""){
        return;
    }


    ws.send(JSON.stringify({

        type:"message",
        text:input.trim()

    }));


    document.getElementById("input").value="";

    document.getElementById("input").style.height="20px";

}

function enterSend(event)
{

    // Shift + Enter は改行
    if (event.shiftKey && event.key === "Enter")
    {
        return;
    }

    // Enter は送信
    if (event.key === "Enter")
    {
        event.preventDefault();
        sendMessage();
    }

}

document.addEventListener("keydown", function(event)
{
    if (event.key === "F2")
    {
        openGoogle();
    }
});

function openGoogle()
{
    window.location.href = "https://www.google.com/";;
}

document.addEventListener("paste", function(event)
{
    const items = event.clipboardData.items;

    for (let i = 0; i < items.length; i++)
    {
        const item = items[i];

        if (item.type.indexOf("image") !== -1){

            const file = item.getAsFile();
            const reader = new FileReader();

            reader.onload = function(){
                ws.send(JSON.stringify({
                    type:"image",
                    image:reader.result
                }));
            };
            reader.readAsDataURL(file);
        }
    }
});

function zoomImage(img)
{
    if (img.classList.contains("zoom"))
    {
        img.classList.remove("zoom");
    }
    else
    {
        img.classList.add("zoom");
    }
}

function scrollToBottom()
{
    const messages = document.getElementById("messages");
    messages.scrollTop = messages.scrollHeight;
}

function toggleUsers()
{
    const users = document.getElementById("users");
    users.classList.toggle("collapsed");
}

let typingTimer;

function typing()
{
    ws.send(JSON.stringify({
        type:"typing",
        typing:true
    }));

    clearTimeout(typingTimer);

    typingTimer = setTimeout(()=>{
        ws.send(JSON.stringify({
            type:"typing",
            typing:false
        }));
    },1000);
}

function autoResize(element)
{
    element.style.height = "20px";
    element.style.height = element.scrollHeight + "px";
}

function sendUrgent()
{
    const input = document.getElementById("input");
    let text = input.value;

    if (text === "")
    {
        return;
    }

    if (!text.startsWith("🚨"))
    {
        text = "🚨!!緊急!!🚨\n" + text;
    }

    ws.send(JSON.stringify({

        type:"message",
        text:text,
        urgent:true
    }));

    input.value = "";
}

function pinMessage(text)
{
    ws.send(JSON.stringify({
        type:"pin",
        text:text
    }));
}

function unpinMessage(id)
{
    ws.send(JSON.stringify({
        type:"unpin",
        id:id
    }));
}

function joinRoom(){

    const name =
        document.getElementById("name").value;

    const room =
        document.getElementById("room").value;
    
    const password =
        document.getElementById("password").value;

    if(name === ""){

        alert("名前を入力してください");

        return;

    }


    myName = name;


    ws.send(JSON.stringify({

        type:"join",

        name:name,

        room:room,

        password:password

    }));

    document.getElementById("name").disabled=true;
    document.getElementById("room").disabled=true;

}

function openBoardWindow(){

    const room =
        document.getElementById("room").value;


    window.open(
        "/board.html?room=" + room,
        "WhiteBoard",
        "width=900,height=700"
    );

}

function reaction(messageId, emoji){

    ws.send(JSON.stringify({

        type:"reaction",

        messageId:messageId,

        emoji:emoji

    }));

}

</script>
</body>
</html>
