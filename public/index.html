<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TaskMemo</title>

<style>

body {
    font-family: sans-serif;
    background-color: #111;
    color: white;
}

#messages {

    flex: 1;

    width: auto;
    height: 0;

    border: 1px solid #333;
    padding: 15px;

    overflow-y: auto;

    background:#1e1e1e;

}


/* メッセージ全体 */
.message {
    margin:6px 5px;
    display:flex;
}


/* 左側（相手） */
.left {
    justify-content: flex-start;
}


/* 右側（自分） */
.right {
    justify-content: flex-end;
}


/* 名前 */
.name {

    font-size:13px;
    color:#9cdcfe;
    margin-bottom:3px;

}

.other {
    background:#333333;
}

.mine {
    background:#094771;
}

.tool-button {
    background: #252526;
    color: #d4d4d4;
    border: 1px solid #3c3c3c;
    padding: 8px 12px;
    cursor: pointer;
}

.tool-button:hover {
    background: #333333;
}

#users {

    width:220px;
    flex-shrink:0;

    background:#222;
    padding:10px;

    transition:0.3s;
    overflow:hidden;

}


#users.collapsed {

    width:50px;
    padding:0;

}

#users.collapsed .users-icon {

    display:block;

}


#users.collapsed #user-list {

    display:none;

}

input {
    background: #333;
    color: white;
    border: 1px solid #555;
    padding: 8px;
}

button {
    background: #333;
    color: white;
    border: 1px solid #555;
    padding: 8px 15px;
}

.balloon {
    padding:6px 10px;
    border-radius:6px;
    background:#2d2d30;
    border:1px solid #3c3c3c;
    min-width:80px;
    white-space: pre-wrap;
}

.layout {

    display:flex;
    height:80vh;

}

.chat-area {

    flex:1;

    display:flex;

    flex-direction:column;

    min-height:0;

}

.input-area {

    display:flex;

    background:#252526;

    padding:10px;

    flex-shrink:0;

}


.input-area textarea {

    flex:1;

    background:#333;
    color:white;

    border:1px solid #555;

    padding:8px;

    resize:none;

    overflow-y:auto;
    height:20px;
    min-height:20px;

    max-height:120px;
    padding:5px 8px;
    font-family:sans-serif;

}

.header {

    height:50px;
    background:#252526;
    border-bottom:1px solid #3c3c3c;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 20px;

}

.title {

    font-size:18px;
    font-weight:bold;
    color:#ffffff;

}

.status {
    font-size:13px;
    color:#9cdcfe;
}

.user-input {

    background:#1e1e1e;
    padding:10px 20px;
    border-bottom:1px solid #333;
}

.users-icon {

    display:none;

    text-align:center;

    font-size:22px;

    padding:10px;

}

.time {

    font-size:11px;
    color:#999;
    text-align:right;
    margin-top:2px;

}

.chat-image {

    max-width:250px;
    border-radius:8px;
    cursor:pointer;

    transition:0.2s;

}

.chat-image.zoom {

    max-width:800px;
    position:relative;

}

#typing {

    height:20px;
    color:#9cdcfe;
    font-size:13px;
    padding-left:15px;
    font-style:italic;

}

.typing-dots::after {

    content:"";

    animation:dots 1.5s infinite;

}


@keyframes dots {

    0% {
        content:"";
    }

    33% {
        content:".";
    }

    66% {
        content:"..";
    }

    100% {
        content:"...";
    }

}


</style>

</head>

<body>

<header class="header">

    <div class="title">
        TASK Workspace
    </div>

    <div class="status">
        Online Chat
    </div>

    <button class="tool-button" onclick="toggleUsers()">
    ☰
    </button>

</header>

<div class="user-input">

    名前：
    <input id="name" type="text">

</div>

<div class="layout">

    <div id="users">

        <div class="users-icon">
            👥
        </div>

        <div id="user-list">
        </div>

    </div>


    <div class="chat-area">
        
        <div id="messages"></div>

        <div id="typing"></div>

        <div class="input-area">

        <textarea id="input"
            onkeydown="enterSend(event)"
            oninput="typing();"></textarea>

            <button onclick="sendMessage()">
                送信
            </button>

        </div>

    </div>

</div>

<button class="tool-button" button onclick="openGoogle()">
隠す
</button>

<script>

const ws = new WebSocket(
    location.origin.replace("http", "ws")
);

let myName = "";
let myId = "";

ws.onopen = function(){
    myName =
        document.getElementById("name").value;
};

ws.onmessage = function(event){

    const data = JSON.parse(event.data);

    if(data.type === "typing"){

        const typing =
            document.getElementById("typing");


        if(data.id !== myId && data.typing){

            typing.innerHTML =
                data.name + " さんが入力中<span class='typing-dots'></span>";

        }else{

            typing.innerHTML = "";

        }


        return;

    }

    if(data.type === "id"){

        myId = data.id;

        return;

    }

    if(data.type === "users"){

    const userList =
        document.getElementById("user-list");


    userList.innerHTML =
        data.users.map(
            user => "🟢 " + user
        ).join("<br>");


    return;

}

if(data.type === "image"){


    const messages =
        document.getElementById("messages");


    let position = "left";

    if(data.id === myId){

        position = "right";

    }


    messages.innerHTML += `

    <div class="message ${position}">

        <div>

            <div class="name">
                🖼️ ${data.name}
            </div>

            <img 
                src="${data.image}"
                class="chat-image"
                onclick="zoomImage(this)"
            >

        </div>

    </div>

    `;

    scrollToBottom();

    return;

}

    const messages =
        document.getElementById("messages");

    // 入退室メッセージ
    if(data.type === "system"){
        messages.innerHTML += `
        <div style="
            text-align:center;
            color:gray;
            margin:10px;
        ">
            ${data.message}
        </div>
        `;
        scrollToBottom();
        return;
    }

    // 普通のメッセージ
    let position = "left";
    let color = "other";
    if(data.id === myId){
        position = "right";
        color = "mine";
    }

    messages.innerHTML += `
    <div class="message ${position}">
        <div>
            <div class="name">
                ${data.name}
            </div>
            <div class="balloon ${color}">

                ${formatMessage(data.text)}

                <div class="time">
                    ${data.time || ""}
                </div>

            </div>
        </div>
    </div>
    `;

    // 追加：一番下へ移動
    scrollToBottom();
};

function sendMessage(){

    const name =
        document.getElementById("name").value;

    const input =
        document.getElementById("input").value;

    if(name === ""){
        alert("名前を入力してください");
        return;
    }

    // 初回だけ入室通知
    if(myName === ""){

        myName = name;

        ws.send(JSON.stringify({
            type:"join",
            name:name
        }));
    }

    if(input === ""){
        return;
    }

    ws.send(JSON.stringify({

        type:"message",
        text:input.trim()

    }));
    document.getElementById("input").value="";

    document.getElementById("input").style.height="20px";
}

function enterSend(event){


    // Shift + Enter は改行
    if(event.shiftKey && event.key === "Enter"){

        return;

    }


    // Enter は送信
    if(event.key === "Enter"){

        event.preventDefault();

        sendMessage();

    }

}

document.addEventListener("keydown", function(event){

    if(event.key === "F2"){

        openGoogle();

    }

});

function openGoogle(){

    window.location.href = "https://www.google.com/";;

}

document.addEventListener("paste", function(event){

    const items = event.clipboardData.items;


    for(let i = 0; i < items.length; i++){

        const item = items[i];


        if(item.type.indexOf("image") !== -1){

            const file = item.getAsFile();


            const reader = new FileReader();


            reader.onload = function(){

                ws.send(JSON.stringify({

                    type:"image",
                    image:reader.result

                }));

            };


            reader.readAsDataURL(file);

        }

    }

});

function zoomImage(img){


    if(img.classList.contains("zoom")){


        img.classList.remove("zoom");


    }else{


        img.classList.add("zoom");


    }


}

function scrollToBottom(){

    const messages =
        document.getElementById("messages");

    messages.scrollTop =
        messages.scrollHeight;

}

function toggleUsers(){

    const users =
        document.getElementById("users");


    users.classList.toggle("collapsed");

}

let typingTimer;

function typing(){

    ws.send(JSON.stringify({

        type:"typing",
        typing:true

    }));


    clearTimeout(typingTimer);


    typingTimer = setTimeout(()=>{

        ws.send(JSON.stringify({

            type:"typing",
            typing:false

        }));

    },1000);

}

function autoResize(element){

    element.style.height = "auto";


    element.style.height =
        element.scrollHeight + "px";

}

function formatMessage(text){

    return text
        .replace(/\r\n/g, "\n")
        .replace(/^[ \t]+/gm, "")
        .trim();

}

</script>

</body>

</html>
