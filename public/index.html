<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TaskMemo</title>

<style>

body {
    font-family: sans-serif;
    background-color: #111;
    color: white;
}

#messages {
    width: 400px;
    height: 450px;
    border: 1px solid #333;
    padding: 10px;
    overflow-y: auto;
    background: #222;
}


/* メッセージ全体 */
.message {
    margin: 10px;
    display: flex;
}


/* 左側（相手） */
.left {
    justify-content: flex-start;
}


/* 右側（自分） */
.right {
    justify-content: flex-end;
}


/* 名前 */
.name {
    font-size: 12px;
    color: #555;
}


/* 吹き出し */
.balloon {
    padding: 10px 15px;
    border-radius: 15px;
    max-width: 250px;
}


/* 相手の色 */
.other {
    background: #444;
    color: white;
}


/* 自分の色 */
.mine {
    background: #075e54;
    color: white;
}

#users {

    background:#222;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;

}

input {
    background: #333;
    color: white;
    border: 1px solid #555;
    padding: 8px;
}

button {
    background: #333;
    color: white;
    border: 1px solid #555;
    padding: 8px 15px;
}

</style>

</head>

<body>

<h5>TASK</h5>

名前：
<input id="name" type="text">

<h5>On</h5>

<div id="users">
</div>

<div id="messages"></div>

<input id="input" type="text" onkeydown="enterSend(event)">
<button onclick="sendMessage()">送信</button>

<script>

const ws = new WebSocket(
    location.origin.replace("http", "ws")
);

let myName = "";
let myId = "";

ws.onopen = function(){
    myName =
        document.getElementById("name").value;
};

ws.onmessage = function(event){

    const data = JSON.parse(event.data);

    if(data.type === "id"){

        myId = data.id;

        return;

    }

    if(data.type === "users"){

    const users =
        document.getElementById("users");


    users.innerHTML =
        "🟢 " + data.users.join("<br>");


    return;

}

    const messages =
        document.getElementById("messages");

    // 入退室メッセージ
    if(data.type === "system"){
        messages.innerHTML += `
        <div style="
            text-align:center;
            color:gray;
            margin:10px;
        ">
            ${data.message}
        </div>
        `;
        return;
    }

    // 普通のメッセージ
    let position = "left";
    let color = "other";
    if(data.id === myId){
        position = "right";
        color = "mine";
    }

    messages.innerHTML += `
    <div class="message ${position}">
        <div>
            <div class="name">
                ${data.name}
            </div>
            <div class="balloon ${color}">
                ${data.text}
            </div>
        </div>
    </div>
    `;

    // 追加：一番下へ移動
    messages.scrollTop = messages.scrollHeight;
};

function sendMessage(){

    const name =
        document.getElementById("name").value;

    const input =
        document.getElementById("input").value;

    if(name === ""){
        alert("名前を入力してください");
        return;
    }

    // 初回だけ入室通知
    if(myName === ""){

        myName = name;

        ws.send(JSON.stringify({
            type:"join",
            name:name
        }));
    }

    if(input === ""){
        return;
    }

    ws.send(JSON.stringify({

        type:"message",
        text:input

    }));
    document.getElementById("input").value="";
}

function enterSend(event) {

    if(event.key === "Enter") {
        sendMessage();
    }
}

</script>

</body>

</html>
